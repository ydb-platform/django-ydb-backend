name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest

    concurrency:
      group: test-${{ github.ref }}-${{ matrix.python-version }}-${{ matrix.django-version }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        # `coverage: true` marks one job per Django version (4.2/5.2/6.0) as the
        # coverage source. Coverage only varies by Django version (e.g. the
        # django.VERSION >= (6, 0) branch in creation.py), not by Python, so one
        # job per Django version is enough; Codecov merges the three uploads.
        include:
          - python-version: "3.10"
            django-version: "4.2"
          - python-version: "3.12"
            django-version: "4.2"
            coverage: true
          - python-version: "3.10"
            django-version: "5.2"
          - python-version: "3.12"
            django-version: "5.2"
            coverage: true
          - python-version: "3.12"
            django-version: "6.0"
            coverage: true
          - python-version: "3.13"
            django-version: "6.0"

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install poetry

      - name: Install packages
        run: poetry install

      - name: Override Django version
        run: poetry run pip install "django~=${{ matrix.django-version }}"

      - name: Start YDB
        run: docker compose up -d --wait

      - name: Run tests
        # Only instrument under coverage on the designated coverage jobs; the
        # rest run the suite directly to avoid the instrumentation overhead.
        run: |
          if [ "${{ matrix.coverage }}" = "true" ]; then
            poetry run coverage run tests/runtests.py
          else
            poetry run python tests/runtests.py
          fi

      - name: Generate coverage report
        if: ${{ matrix.coverage }}
        run: poetry run coverage xml

      - name: Upload coverage to Codecov
        if: ${{ matrix.coverage }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: dj${{ matrix.django-version }}
          name: dj${{ matrix.django-version }}
          # Codecov outages should not fail the test gate; coverage is an
          # informational signal, not a correctness check.
          fail_ci_if_error: false

  conformance:
    # Runs Django's own bundled test suite against YDB as a required gate on
    # every supported Django version. `basic`/`lookup` must pass (gated by
    # DatabaseFeatures.django_test_skips); a real failure turns the job red
    # rather than being hidden behind continue-on-error.
    runs-on: ubuntu-latest

    concurrency:
      group: conformance-${{ github.ref }}-${{ matrix.python-version }}-${{ matrix.django-version }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            django-version: "4.2"
          - python-version: "3.12"
            django-version: "4.2"
          - python-version: "3.10"
            django-version: "5.2"
          - python-version: "3.12"
            django-version: "5.2"
          - python-version: "3.12"
            django-version: "6.0"
          - python-version: "3.13"
            django-version: "6.0"

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install poetry

      - name: Install packages
        run: poetry install

      - name: Override Django version
        id: django
        run: |
          poetry run pip install "django~=${{ matrix.django-version }}"
          version="$(poetry run python -c 'import django; print(django.get_version())')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Django source tree
        uses: actions/cache@v4
        with:
          path: .django-src
          # Key on the exact resolved version (e.g. 6.0.6): caches are immutable
          # per key, so a minor-version key would go stale after a patch release
          # and reclone on every run without ever updating.
          key: conformance-django-${{ steps.django.outputs.version }}

      - name: Start YDB
        run: docker compose up -d --wait

      - name: Conformance — core and relation modules
        run: >-
          conformance/run.sh basic lookup
          select_related many_to_one one_to_one m2m_through
