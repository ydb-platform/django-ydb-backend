name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest

    concurrency:
      group: test-${{ github.ref }}-${{ matrix.python-version }}-${{ matrix.django-version }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        # `coverage: true` marks one job per Django version (4.2/5.2/6.0) as the
        # coverage source. Coverage only varies by Django version (e.g. the
        # django.VERSION >= (6, 0) branch in creation.py), not by Python, so one
        # job per Django version is enough; Codecov merges the three uploads.
        include:
          - python-version: "3.10"
            django-version: "4.2"
          - python-version: "3.12"
            django-version: "4.2"
            coverage: true
          - python-version: "3.10"
            django-version: "5.2"
          - python-version: "3.12"
            django-version: "5.2"
            coverage: true
          - python-version: "3.12"
            django-version: "6.0"
            coverage: true
          - python-version: "3.13"
            django-version: "6.0"

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install poetry

      - name: Install packages
        run: poetry install

      - name: Override Django version
        run: poetry run pip install "django~=${{ matrix.django-version }}"

      - name: Start YDB
        run: docker compose up -d --wait

      - name: Run tests
        # Only instrument under coverage on the designated coverage jobs; the
        # rest run the suite directly to avoid the instrumentation overhead.
        run: |
          if [ "${{ matrix.coverage }}" = "true" ]; then
            poetry run coverage run tests/runtests.py
          else
            poetry run python tests/runtests.py
          fi

      - name: Generate coverage report
        if: ${{ matrix.coverage }}
        run: poetry run coverage xml

      - name: Upload coverage to Codecov
        if: ${{ matrix.coverage }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: dj${{ matrix.django-version }}
          name: dj${{ matrix.django-version }}
          # Codecov outages should not fail the test gate; coverage is an
          # informational signal, not a correctness check.
          fail_ci_if_error: false

  conformance:
    # Runs Django's own bundled test suite against YDB as a required gate on
    # every supported Django version. `basic`/`lookup` must pass (gated by
    # DatabaseFeatures.django_test_skips); a real failure turns the job red
    # rather than being hidden behind continue-on-error.
    runs-on: ubuntu-latest

    concurrency:
      group: conformance-${{ github.ref }}-${{ matrix.python-version }}-${{ matrix.django-version }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            django-version: "4.2"
          - python-version: "3.12"
            django-version: "4.2"
          - python-version: "3.10"
            django-version: "5.2"
          - python-version: "3.12"
            django-version: "5.2"
          - python-version: "3.12"
            django-version: "6.0"
          - python-version: "3.13"
            django-version: "6.0"

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install poetry

      - name: Install packages
        run: poetry install

      - name: Override Django version
        id: django
        run: |
          poetry run pip install "django~=${{ matrix.django-version }}"
          version="$(poetry run python -c 'import django; print(django.get_version())')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Django source tree
        uses: actions/cache@v4
        with:
          path: .django-src
          # Key on the exact resolved version (e.g. 6.0.6): caches are immutable
          # per key, so a minor-version key would go stale after a patch release
          # and reclone on every run without ever updating.
          key: conformance-django-${{ steps.django.outputs.version }}

      - name: Start YDB
        run: docker compose up -d --wait

      - name: Conformance — core, relation, and data modules
        env:
          # Fan out across the runner's CPUs: the backend clones the test
          # database per worker (features.can_clone_databases). Linux runners
          # use multiprocessing "fork", so workers inherit the
          # django_test_skips monkeypatches.
          DJANGO_TEST_PROCESSES: "4"
        run: |
          set -o pipefail
          conformance/run.sh \
            basic lookup or_lookups string_lookup xor_lookups \
            select_related select_related_onetoone many_to_one \
            one_to_one many_to_one_null known_related_objects reverse_lookup \
            mutually_referential null_fk null_fk_ordering \
            m2m_through m2m_intermediary m2m_multiple m2m_recursive \
            m2m_signals m2m_through_regress m2o_recursive m2m_and_m2o m2m_regress \
            many_to_many foreign_object \
            custom_managers custom_pk custom_lookups defer defer_regress \
            properties get_object_or_404 get_or_create force_insert_update \
            update update_only_fields bulk_create null_queries extra_regress \
            ordering order_with_respect_to model_regress model_indexes indexes \
            get_earliest_or_latest swappable_models distinct_on_fields \
            from_db_value managers_regress queryset_pickle \
            dates datatypes db_typecasts \
            2>&1 | tee "${RUNNER_TEMP:-/tmp}/conformance.out"

      - name: Publish conformance pass-rate
        if: always()
        run: |
          out="${RUNNER_TEMP:-/tmp}/conformance.out"
          [ -f "$out" ] || exit 0
          # unittest writes its summary to stderr (captured above). "Ran N"
          # counts every test including skipped, so passed = ran - skipped -
          # failures - errors.
          ran=$(grep -oE 'Ran [0-9]+ test' "$out" | tail -1 | grep -oE '[0-9]+' || echo 0)
          summary=$(grep -E '^(OK|FAILED)' "$out" | tail -1 || echo "")
          num() { printf '%s' "$1" | grep -oE "$2=[0-9]+" | grep -oE '[0-9]+' || echo 0; }
          skipped=$(num "$summary" skipped); fails=$(num "$summary" failures); errs=$(num "$summary" errors)
          passed=$(( ran - skipped - fails - errs ))
          rate=$(awk "BEGIN{ if ($ran>0) printf \"%.1f\", 100*$passed/$ran; else print 0 }")
          {
            echo "### Conformance — Django ${{ steps.django.outputs.version }}, Python ${{ matrix.python-version }}"
            echo ""
            echo "| Ran | Passed | Skipped | Failures | Errors | Pass-rate |"
            echo "|----:|-------:|--------:|---------:|-------:|----------:|"
            echo "| $ran | $passed | $skipped | $fails | $errs | ${rate}% |"
          } >> "$GITHUB_STEP_SUMMARY"
