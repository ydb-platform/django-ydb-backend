name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    concurrency:
      group: test-${{ github.ref }}-${{ matrix.python-version }}-${{ matrix.django-version }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            django-version: "4.2"
          - python-version: "3.12"
            django-version: "4.2"
          - python-version: "3.10"
            django-version: "5.2"
          - python-version: "3.12"
            django-version: "5.2"
          - python-version: "3.12"
            django-version: "6.0"
          - python-version: "3.13"
            django-version: "6.0"

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install poetry

      - name: Install packages
        run: poetry install

      - name: Override Django version
        run: poetry run pip install "django~=${{ matrix.django-version }}"

      - name: Start YDB
        run: docker compose up -d --wait

      - name: Run tests
        run: poetry run coverage run tests/runtests.py
