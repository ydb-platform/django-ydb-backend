name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest

    concurrency:
      group: test-${{ github.ref }}-${{ matrix.python-version }}-${{ matrix.django-version }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            django-version: "4.2"
          - python-version: "3.12"
            django-version: "4.2"
          - python-version: "3.10"
            django-version: "5.2"
          - python-version: "3.12"
            django-version: "5.2"
          - python-version: "3.12"
            django-version: "6.0"
          - python-version: "3.13"
            django-version: "6.0"

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install poetry

      - name: Install packages
        run: poetry install

      - name: Override Django version
        run: poetry run pip install "django~=${{ matrix.django-version }}"

      - name: Start YDB
        run: docker compose up -d --wait

      - name: Run tests
        run: poetry run coverage run tests/runtests.py

  conformance:
    # Runs Django's own bundled test suite against YDB as a required gate on
    # every supported Django version. `basic`/`lookup` must pass (gated by
    # DatabaseFeatures.django_test_skips); a real failure turns the job red
    # rather than being hidden behind continue-on-error.
    runs-on: ubuntu-latest

    concurrency:
      group: conformance-${{ github.ref }}-${{ matrix.python-version }}-${{ matrix.django-version }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            django-version: "4.2"
          - python-version: "3.12"
            django-version: "4.2"
          - python-version: "3.10"
            django-version: "5.2"
          - python-version: "3.12"
            django-version: "5.2"
          - python-version: "3.12"
            django-version: "6.0"
          - python-version: "3.13"
            django-version: "6.0"

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install poetry

      - name: Install packages
        run: poetry install

      - name: Override Django version
        run: poetry run pip install "django~=${{ matrix.django-version }}"

      - name: Cache Django source tree
        uses: actions/cache@v4
        with:
          path: .django-src
          key: conformance-django-${{ matrix.django-version }}

      - name: Start YDB
        run: docker compose up -d --wait

      - name: Conformance — basic, lookup
        run: conformance/run.sh basic lookup
