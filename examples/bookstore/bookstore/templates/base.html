<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Bookstore{% endblock %}</title>
    <style>
      :root {
        --bg: #0f172a; --card: #ffffff; --muted: #64748b;
        --accent: #2563eb; --line: #e2e8f0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; color: #0f172a; background: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
      }
      header { background: var(--bg); color: #fff; }
      .bar {
        max-width: 880px; margin: 0 auto; padding: 18px 20px;
        display: flex; align-items: center; gap: 20px;
      }
      .bar a { color: #cbd5e1; text-decoration: none; font-size: 14px; }
      .bar a:hover { color: #fff; }
      .bar .brand { color: #fff; font-weight: 700; font-size: 18px; margin-right: auto; }
      main { max-width: 880px; margin: 28px auto; padding: 0 20px; }
      h1 { font-size: 24px; margin: 0 0 4px; }
      h2 { font-size: 16px; margin: 0 0 14px; }
      .muted { color: var(--muted); }
      .card {
        background: var(--card); border: 1px solid var(--line); border-radius: 12px;
        padding: 20px; margin: 18px 0; box-shadow: 0 1px 2px rgba(0, 0, 0, .04);
      }
      form.add { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
      form.add label {
        display: flex; flex-direction: column; gap: 6px;
        font-size: 13px; color: var(--muted);
      }
      form.add input {
        padding: 9px 10px; border: 1px solid var(--line);
        border-radius: 8px; font-size: 14px;
      }
      form.add .full { grid-column: 1 / -1; }
      button {
        background: var(--accent); color: #fff; border: 0; border-radius: 8px;
        padding: 10px 16px; font-size: 14px; cursor: pointer;
      }
      button:hover { background: #1d4ed8; }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--line); font-size: 14px; }
      th {
        color: var(--muted); font-weight: 600; font-size: 12px;
        text-transform: uppercase; letter-spacing: .04em;
      }
      .tag {
        display: inline-block; background: #eff6ff; color: var(--accent);
        border-radius: 999px; padding: 2px 8px; font-size: 12px; margin: 0 4px 4px 0;
      }
      .empty { color: var(--muted); padding: 16px 0; }
      footer {
        max-width: 880px; margin: 24px auto; padding: 0 20px 40px;
        color: var(--muted); font-size: 13px;
      }
      a { color: var(--accent); }
    </style>
  </head>
  <body>
    <header>
      <div class="bar">
        <a class="brand" href="/">📚 Bookstore</a>
        <a href="/">Home</a>
        <a href="/about/">About</a>
        <a href="/api/">API</a>
        <a href="/admin/">Admin</a>
      </div>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <footer>
      Django on the <a href="https://ydb.tech/">YDB</a> backend ·
      <a href="https://ydb-platform.github.io/django-ydb-backend/">documentation</a>
    </footer>
  </body>
</html>
