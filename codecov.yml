# Codecov configuration.
# https://docs.codecov.com/docs/codecovyml-reference

codecov:
  notify:
    # One job per Django version (4.2/5.2/6.0) uploads coverage; wait for all
    # three before computing statuses so the reported number doesn't flap as
    # uploads trickle in.
    after_n_builds: 3

coverage:
  status:
    project:
      default:
        # Compare against the base commit; allow a small dip so unrelated
        # refactors don't turn the check red.
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%

# One job per Django version uploads with a dj<ver> flag; merge them into the
# project total without requiring every flag on every commit.
flag_management:
  default_rules:
    carryforward: true

comment:
  layout: "reach, diff, flags, files"
  require_changes: false

# Coverage is measured for the backend package only (see tool.coverage.run in
# pyproject.toml); keep non-shipped code out of any report just in case.
ignore:
  - "tests"
  - "examples"
  - "docs"
  - "conformance"
