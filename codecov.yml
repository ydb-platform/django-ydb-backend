# Codecov configuration.
# https://docs.codecov.com/docs/codecovyml-reference

codecov:
  notify:
    # Six coverage uploads per run: the integration job and the conformance job
    # each upload once per Django version (4.2/5.2/6.0). Wait for all of them
    # before computing statuses so the number doesn't flap as uploads trickle in.
    after_n_builds: 6

coverage:
  status:
    project:
      default:
        # Compare against the base commit; allow a small dip so unrelated
        # refactors don't turn the check red.
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%

# One job per Django version uploads with a dj<ver> flag on every run, so there
# is nothing to carry forward; keeping it off avoids dragging stale flags into
# the session count.
flag_management:
  default_rules:
    carryforward: false

comment:
  layout: "reach, diff, flags, files"
  require_changes: false

# Coverage is measured for the backend package only (see tool.coverage.run in
# pyproject.toml); keep non-shipped code out of any report just in case.
ignore:
  - "tests"
  - "examples"
  - "docs"
  - "conformance"
